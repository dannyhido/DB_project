<!doctype html>
<html>
    <head>
        <title>Login</title>
        <style>
            * {
                box-sizing: border-box;
            }

            body {
                background-color: #f0f2f5;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }

            .login-container {
                background-color: #ffffff;
                padding: 2.5rem;
                width: 100%;
                max-width: 400px;
                text-align: center;
            }

            h2 {
                color: #1c1e21;
                margin-bottom: 1.5rem;
            }

            input[type="text"],
            input[type="password"] {
                width: 100%;
                padding: 12px;
                margin-bottom: 1rem;
                border: 1px solid #dddfe2;
                border-radius: 6px;
                font-size: 1rem;
            }

            input:focus {
                outline: none;
                border-color: #2c3e50;
                box-shadow: 0 0 0 2px #e7f3ff;
            }

            button {
                width: 100%;
                padding: 12px;
                background-color: #2c3e50;
                border: none;
                border-radius: 6px;
                color: white;
                font-size: 1.1rem;
                font-weight: bold;
                cursor: pointer;
                transition: background-color 0.2s;
            }

            button:hover {
                background-color: #2c3e50;
            }

            a {
                display: inline-block;
                margin-top: 1rem;
                color: #2c3e50;
                text-decoration: none;
                font-size: 0.9rem;
            }

            a:hover {
                text-decoration: underline;
            }
        </style>
    </head>
    <body>
        <div class="login-container">
            <h2>Login</h2>

            <form action="/login" method="POST">
                <input
                    type="text"
                    name="username"
                    placeholder="Username"
                    required
                /><br /><br />

                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required
                /><br /><br />

                <button type="submit">Login</button>
            </form>

            <br />

            <a href="/register">Don't have an account? Register here</a>
        </div>
    </body>
</html>

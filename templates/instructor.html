<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instructor Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { display: flex; min-height: 100vh; background-color: #f8f9fa; }
        .sidebar { width: 250px; background-color: #2c3e50; color: white; padding: 20px 0; flex-shrink: 0; }
        .sidebar h2 { padding: 0 20px; font-size: 1.5rem; margin-bottom: 30px; }
        .sidebar .nav-link { color: rgba(255,255,255,0.8); padding: 12px 20px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background-color: #34495e; color: white; font-weight: bold; }
        .content { flex-grow: 1; padding: 40px; }
        .logout-btn { margin: 0 20px 20px 20px; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="logout-btn">
        <a href="/logout" class="btn btn-sm btn-light w-100">Logout</a>
    </div>
    <h2>Instructor</h2>
    <div class="nav flex-column">
        <a class="nav-link active" onclick="showSection('teaching', this)">My Sections</a>
        <a class="nav-link" onclick="showSection('roster', this)">Section Roster</a>
        <a class="nav-link" onclick="showSection('prereqs', this)">Prerequisites</a>
        <a class="nav-link" onclick="showSection('advisor', this)">Advisor Portal</a>
        <a class="nav-link" onclick="showSection('profile', this)">Personal Info</a>
        <a class="nav-link" onclick="showSection('stats', this)">Stats</a>
    </div>
</div>

<div class="content">
    <h1 id="page-title">Instructor Dashboard</h1>
    <hr>
    <div id="content-area"></div>
</div>

<!-- Grade Modal -->
<div class="modal fade" id="gradeModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Submit Grade</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="modalBody">Loading...</div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const currentInstructorId = {{ instructor_id }};
    let gradeModal;

    window.onload = () => {
        gradeModal = new bootstrap.Modal(document.getElementById('gradeModal'));
        showSection('teaching', document.querySelector('.nav-link'));
    };

    function showSection(section, el) {
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        if (el) el.classList.add('active');
        const area = document.getElementById('content-area');
        const title = document.getElementById('page-title');

        if (section === 'teaching') {
            title.innerText = "My Teaching Schedule";
            area.innerHTML = `
                <div class="row mb-3 g-2">
                    <div class="col-md-4">
                        <select id="filter-semester" class="form-select">
                            <option value="Fall">Fall</option>
                            <option value="Spring">Spring</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <select id="filter-year" class="form-select">
                            <option>2026</option><option>2025</option><option>2027</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <button class="btn btn-primary w-100" onclick="loadTeaching()">Filter</button>
                    </div>
                </div>
                <table class="table table-striped">
                    <thead><tr><th>Course</th><th>Section ID</th><th>Day</th><th>Time</th></tr></thead>
                    <tbody id="teaching-data"><tr><td colspan="4" class="text-center text-muted">Click Filter to load</td></tr></tbody>
                </table>`;
            loadTeaching();
        }
        else if (section === 'roster') {
            title.innerText = "Section Roster & Grading";
            area.innerHTML = `
                <div class="card p-3 mb-3">
                    <select id="section-select" class="form-select" onchange="loadRoster(this.value)">
                        <option value="">Choose a section...</option>
                    </select>
                </div>
                <table class="table table-hover">
                    <thead><tr><th>Student ID</th><th>Name</th><th>Grade</th><th>Actions</th></tr></thead>
                    <tbody id="roster-data"><tr><td colspan="4" class="text-center text-muted">Select a section above</td></tr></tbody>
                </table>`;
            loadSectionDropdown();
        }
        else if (section === 'prereqs') {
            title.innerText = "Manage Prerequisites";
            area.innerHTML = `
                <div class="card p-3 mb-3">
                    <h5>View / Manage Prerequisites</h5>
                    <div class="input-group mb-2">
                        <input type="number" id="prereq-course-id" class="form-control" placeholder="Course ID">
                        <button class="btn btn-primary" onclick="loadPrereqs()">Load</button>
                    </div>
                    <div id="prereq-list" class="mt-2"></div>
                    <hr>
                    <h6>Add Prerequisite</h6>
                    <div class="row g-2">
                        <div class="col"><input type="number" id="add-course-id" class="form-control" placeholder="Course ID"></div>
                        <div class="col"><input type="number" id="add-prereq-id" class="form-control" placeholder="Prereq Course ID"></div>
                        <div class="col-auto"><button class="btn btn-success" onclick="addPrereq()">Add</button></div>
                    </div>
                </div>`;
        }
        else if (section === 'advisor') {
            title.innerText = "Advisor Portal";
            area.innerHTML = `
                <div class="card p-3 mb-3">
                    <h5>Add Advisee</h5>
                    <div class="input-group">
                        <input type="number" id="new-advisee-id" class="form-control" placeholder="Student ID">
                        <button class="btn btn-success" onclick="addAdvisee()">Add</button>
                    </div>
                </div>
                <h5>My Advisees</h5>
                <table class="table table-striped">
                    <thead><tr><th>Student ID</th><th>Name</th><th>Action</th></tr></thead>
                    <tbody id="advisee-data"><tr><td colspan="3" class="text-center text-muted">Loading...</td></tr></tbody>
                </table>`;
            loadAdvisees();
        }
        else if (section === 'stats') {
    title.innerText = "Additional Queries & Statistics";
    area.innerHTML = `
        <div class="row g-4">
            <div class="col-md-6">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Department Grades</h5>
                        <button class="btn btn-outline-primary btn-sm" onclick="queryDeptAvg()">View</button>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Average Class Grade</h5>
                        <div class="mb-2">
                            <input type="text" id="stats-course-id" class="form-control form-control-sm mb-1" placeholder="Course ID">
                            <div class="d-flex gap-1">
                                <input type="number" id="stats-year-start" class="form-control form-control-sm" placeholder="Start Year">
                                <input type="number" id="stats-year-end" class="form-control form-control-sm" placeholder="End Year">
                            </div>
                        </div>
                        <button class="btn btn-outline-primary btn-sm" onclick="queryCourseTrend()">Search</button>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Best/Worst Classes</h5>
                        <div class="d-flex gap-1 mb-2">
                            <select id="rank-sem" class="form-select form-select-sm">
                                <option value="Fall">Fall</option>
                                <option value="Spring">Spring</option>
                            </select>
                            <input type="number" id="rank-year" class="form-control form-control-sm" placeholder="Year">
                        </div>
                        <button class="btn btn-outline-primary btn-sm" onclick="queryRankedClasses()">Search</button>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Number of Students</h5>
                        <div class="d-flex gap-2">
                            <button class="btn btn-outline-info btn-sm" onclick="queryEnrollment('all')">All Time</button>
                            <button class="btn btn-outline-success btn-sm" onclick="queryEnrollment('current')">Current</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-5">
            <h4 id="stats-result-title">Results</h4>
            <div id="stats-results-area" class="table-responsive bg-white p-3 border rounded">

            </div>
        </div>
    `;
}
        else if (section === 'profile') {
            title.innerText = "Personal Information";
            area.innerHTML = `
                <div class="card p-4" style="max-width:500px;">
                    <div class="mb-3"><label class="form-label">First Name</label><input class="form-control" id="fname"></div>
                    <div class="mb-3"><label class="form-label">Last Name</label><input class="form-control" id="lname"></div>
                    <button class="btn btn-primary" onclick="updateProfile()">Save Changes</button>
                </div>`;
            loadProfile();
        }
    }

    async function loadTeaching() {
        const sem = document.getElementById('filter-semester').value;
        const yr = document.getElementById('filter-year').value;
        const res = await fetch(`/api/instructor/sections?semester=${sem}&year=${yr}`);
        const data = await res.json();
        const tbody = document.getElementById('teaching-data');
        if (!data.length) {
            tbody.innerHTML = `<tr><td colspan="4" class="text-muted text-center">No sections found for ${sem} ${yr}</td></tr>`;
            return;
        }
        tbody.innerHTML = data.map(s => `
            <tr>
                <td><strong>${s.title}</strong></td>
                <td>${s.section_id}</td>
                <td>${s.day}</td>
                <td>${String(s.start_hr).padStart(2,'0')}:${String(s.start_min).padStart(2,'0')} - ${String(s.end_hr).padStart(2,'0')}:${String(s.end_min).padStart(2,'0')}</td>
            </tr>`).join('');
    }

    async function loadSectionDropdown() {
        const res = await fetch('/api/instructor/sections_all');
        const data = await res.json();
        const sel = document.getElementById('section-select');
        if (!data.length) {
            sel.innerHTML = '<option value="">No sections assigned</option>';
            return;
        }
        sel.innerHTML = '<option value="">Choose a section...</option>' +
            data.map(s => `<option value="${s.section_id}">${s.title} (${s.semester} ${s.year})</option>`).join('');
    }

    async function loadRoster(sectionId) {
        if (!sectionId) return;
        const res = await fetch(`/api/section/${sectionId}/roster`);
        const data = await res.json();
        const tbody = document.getElementById('roster-data');
        if (!data.length) {
            tbody.innerHTML = `<tr><td colspan="4" class="text-muted text-center">No students enrolled</td></tr>`;
            return;
        }
        tbody.innerHTML = data.map(s => `
            <tr>
                <td>${s.ID}</td>
                <td>${s.name}</td>
                <td><span class="badge bg-secondary">${s.grade || 'N/A'}</span></td>
                <td>
                    <button class="btn btn-sm btn-primary" onclick="openGradeModal(${s.ID}, ${sectionId}, '${s.name}', '${s.grade}')">Grade</button>
                    <button class="btn btn-sm btn-outline-danger" onclick="removeStudent(${s.ID}, ${sectionId})">Remove</button>
                </td>
            </tr>`).join('');
    }

    function openGradeModal(studentId, sectionId, name, currentGrade) {
        document.getElementById('modalTitle').innerText = `Grade: ${name}`;
        document.getElementById('modalBody').innerHTML = `
            <label class="form-label">Select Grade</label>
            <select id="new-grade" class="form-select mb-3">
                ${['A','B','C','D','F'].map(g => `<option value="${g}" ${currentGrade===g?'selected':''}>${g}</option>`).join('')}
            </select>
            <button class="btn btn-primary w-100" onclick="submitGrade(${studentId}, ${sectionId})">Submit</button>`;
        gradeModal.show();
    }

    async function submitGrade(studentId, sectionId) {
        const grade = document.getElementById('new-grade').value;
        const res = await fetch('/api/instructor/grade', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({student_id: studentId, section_id: sectionId, grade})
        });
        if (res.ok) { gradeModal.hide(); loadRoster(sectionId); }
        else { alert("Error submitting grade."); }
    }

    async function removeStudent(studentId, sectionId) {
        if (!confirm("Remove this student from the section?")) return;
        const res = await fetch('/api/instructor/remove_from_section', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({student_id: studentId, section_id: sectionId})
        });
        if (res.ok) loadRoster(sectionId);
    }

    async function loadPrereqs() {
        const courseId = document.getElementById('prereq-course-id').value;
        if (!courseId) return alert("Enter a course ID");
        const res = await fetch(`/api/course_prereqs/${courseId}`);
        const data = await res.json();
        const div = document.getElementById('prereq-list');
        if (!data.length) { div.innerHTML = '<p class="text-muted">No prerequisites found.</p>'; return; }
        div.innerHTML = `<table class="table table-sm"><thead><tr><th>Course</th><th>Prerequisite</th><th></th></tr></thead><tbody>` +
            data.map(p => `
                <tr>
                    <td>${p.title}</td>
                    <td>${p.prereq_title}</td>
                    <td><button class="btn btn-sm btn-outline-danger" onclick="removePrereq(${p.course_id}, ${p.prereq_id})">Remove</button></td>
                </tr>`).join('') + '</tbody></table>';
    }

    async function addPrereq() {
        const course_id = document.getElementById('add-course-id').value;
        const prereq_id = document.getElementById('add-prereq-id').value;
        if (!course_id || !prereq_id) return alert("Fill in both fields");
        const res = await fetch('/api/add_prereq', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({course_id, prereq_id})
        });
        if (res.ok) alert("Prerequisite added!");
        else { const d = await res.json(); alert(d.error || "Error"); }
    }

    async function removePrereq(course_id, prereq_id) {
        const res = await fetch('/api/remove_prereq', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({course_id, prereq_id})
        });
        if (res.ok) loadPrereqs();
    }

    async function loadAdvisees() {
        const res = await fetch('/api/instructor/advisees');
        const data = await res.json();
        const tbody = document.getElementById('advisee-data');
        if (!data.length) { tbody.innerHTML = `<tr><td colspan="3" class="text-muted text-center">No advisees</td></tr>`; return; }
        tbody.innerHTML = data.map(s => `
            <tr>
                <td>${s.ID}</td>
                <td>${s.name}</td>
                <td><button class="btn btn-sm btn-danger" onclick="removeAdvisee(${s.ID})">Remove</button></td>
            </tr>`).join('');
    }

    async function addAdvisee() {
        const studentId = document.getElementById('new-advisee-id').value;
        if (!studentId) return alert("Enter a student ID");
        const res = await fetch('/api/instructor/add_advisee', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({student_id: studentId})
        });
        if (res.ok) { document.getElementById('new-advisee-id').value = ''; loadAdvisees(); }
        else { const d = await res.json(); alert(d.error || "Could not add student"); }
    }

    async function removeAdvisee(studentId) {
        if (!confirm("Remove this advisee?")) return;
        const res = await fetch('/api/instructor/remove_advisee', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({student_id: studentId})
        });
        if (res.ok) loadAdvisees();
    }

    async function loadProfile() {
        const res = await fetch(`/api/instructor_details/${currentInstructorId}`);
        const data = await res.json();
        if (data && data.first_name) {
            document.getElementById('fname').value = data.first_name;
            document.getElementById('lname').value = data.last_name;
        }
    }

    async function updateProfile() {
        const res = await fetch(`/api/update_instructor_name/${currentInstructorId}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                first_name: document.getElementById('fname').value,
                last_name: document.getElementById('lname').value
            })
        });
        if (res.ok) alert("Profile updated!");
        else alert("Update failed.");
    }
</script>
</body>
</html>

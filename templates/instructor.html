<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instructor Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { display: flex; min-height: 100vh; background-color: #f8f9fa; }
        .sidebar {
            width: 250px;
            background-color: #2c3e50;
            color: white;
            padding: 20px 0;
            flex-shrink: 0;
        }
        .sidebar h2 { padding: 0 20px; font-size: 1.5rem; margin-bottom: 30px; }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.8);
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar .nav-link:hover { background-color: #34495e; color: white; }
        .sidebar .nav-link.active { background-color: #34495e; font-weight: bold; }
        .content { flex-grow: 1; padding: 40px; }
        .logout-btn { margin: 0 20px 20px 20px; }
        .clickable-name { color: #0d6efd; text-decoration: none; cursor: pointer; font-weight: bold; }
        .clickable-name:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logout-btn">
            <a href="/logout" class="btn btn-sm btn-light">Logout</a>
        </div>
        <h2>Instructor</h2>
        <div class="nav flex-column">
            <a class="nav-link active" onclick="showSection('teaching')">My Sections</a>
            <a class="nav-link" onclick="showSection('roster')">Section Roster</a>
            <a class="nav-link" onclick="showSection('advisor')">Advisor Portal</a>
            <a class="nav-link" onclick="showSection('profile')">Personal Info</a>
        </div>
    </div>

    <div class="content">
        <h1 id="page-title">Instructor Dashboard</h1>
        <hr>
        <div id="content-area"></div>
    </div>

    <div class="modal fade" id="infoModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Manage Student</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="modalBody">
                    Loading...
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const currentInstructorId = 2;
        let infoModal;

        window.onload = () => {
            infoModal = new bootstrap.Modal(document.getElementById('infoModal'));
            showSection('teaching');
        };

        function showSection(section) {
            const area = document.getElementById('content-area');
            const title = document.getElementById('page-title');
            
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            if (event && event.target) event.target.classList.add('active');

            if (section === 'teaching') {
                title.innerText = "Current Teaching Schedule";
                area.innerHTML = `
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <select id="filter-semester" class="form-select">
                                <option value="Fall">Fall</option>
                                <option value="Spring">Spring</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <select id="filter-year" class="form-select">
                                <option value="2026">2026</option>
                                <option value="2025">2025</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <button class="btn btn-primary w-100" onclick="loadTeachingSchedule()">Filter Sections</button>
                        </div>
                    </div>
                    <table class="table table-striped">
                        <thead><tr><th>Course</th><th>Section ID</th><th>Time</th><th>Room</th></tr></thead>
                        <tbody id="teaching-data"></tbody>
                    </table>`;
                loadTeachingSchedule();
            } 
            else if (section === 'roster') {
                title.innerText = "Section Roster & Grading";
                area.innerHTML = `
                    <div class="card p-3 mb-4">
                        <h5>Select a Section</h5>
                        <select id="section-select" class="form-select" onchange="loadRoster(this.value)"></select>
                    </div>
                    <table class="table table-hover">
                        <thead><tr><th>Student ID</th><th>Name</th><th>Current Grade</th><th>Action</th></tr></thead>
                        <tbody id="roster-data"><tr><td colspan="4" class="text-center">Select a section above</td></tr></tbody>
                    </table>`;
                loadInstructorSectionsForDropdown();
            }
            else if (section === 'advisor') {
                title.innerText = "Advisor Management";
                area.innerHTML = `
                    <div class="card p-3 mb-4">
                        <h5>Add Student to Advising</h5>
                        <div class="input-group">
                            <input type="text" id="new-student-id" class="form-control" placeholder="Student ID">
                            <button class="btn btn-success" onclick="addAdvisee()">Add Advisee</button>
                        </div>
                    </div>
                    <h5>My Current Advisees</h5>
                    <table class="table table-striped">
                        <thead><tr><th>Student ID</th><th>Name</th><th>Action</th></tr></thead>
                        <tbody id="advisee-data"></tbody>
                    </table>`;
                loadAdvisees();
            }
            else if (section === 'profile') {
                title.innerText = "Personal Information";
                area.innerHTML = `
                    <div class="card p-4" style="max-width: 500px;">
                        <form id="profile-form">
                            <div class="mb-3">
                                <label class="form-label">First Name</label>
                                <input type="text" class="form-control" id="fname" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Last Name</label>
                                <input type="text" class="form-control" id="lname" required>
                            </div>
                            <button type="button" class="btn btn-primary" onclick="updateProfile()">Save Changes</button>
                        </form>
                    </div>`;
                loadProfileData();
            }
        }

        // --- Instructor Data Fetching ---

        async function loadTeachingSchedule() {
            const sem = document.getElementById('filter-semester').value;
            const yr = document.getElementById('filter-year').value;
            const response = await fetch(`/api/instructor/sections?semester=${sem}&year=${yr}`);
            const data = await response.json();
            const tbody = document.getElementById('teaching-data');
            tbody.innerHTML = data.map(s => `
                <tr>
                    <td><strong>${s.title}</strong></td>
                    <td>${s.section_id}</td>
                    <td>${s.day} ${s.start_hr}:${s.start_min}</td>
                    <td>${s.building_name} ${s.room_number}</td>
                </tr>`).join('');
        }

        async function loadInstructorSectionsForDropdown() {
            const response = await fetch(`/api/instructor/sections_all`);
            const data = await response.json();
            const select = document.getElementById('section-select');
            select.innerHTML = '<option value="">Choose Section...</option>' + 
                data.map(s => `<option value="${s.section_id}">${s.title} (${s.semester} ${s.year})</option>`).join('');
        }

        async function loadRoster(sectionId) {
            if(!sectionId) return;
            const response = await fetch(`/api/section/${sectionId}/roster`);
            const data = await response.json();
            const tbody = document.getElementById('roster-data');
            tbody.innerHTML = data.map(s => `
                <tr>
                    <td>${s.ID}</td>
                    <td>${s.name}</td>
                    <td><span class="badge bg-secondary">${s.grade || 'N/A'}</span></td>
                    <td>
                        <button class="btn btn-sm btn-primary" onclick="openGradeModal('${s.ID}', '${sectionId}', '${s.name}', '${s.grade}')">Edit Grade</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="removeFromSection('${s.ID}', '${sectionId}')">Remove</button>
                    </td>
                </tr>`).join('');
        }

        function openGradeModal(studentId, sectionId, name, currentGrade) {
            document.getElementById('modalTitle').innerText = `Submit Grade: ${name}`;
            document.getElementById('modalBody').innerHTML = `
                <div class="mb-3">
                    <label class="form-label">Final Grade</label>
                    <select id="new-grade" class="form-select">
                        <option value="A" ${currentGrade === 'A' ? 'selected' : ''}>A</option>
                        <option value="B" ${currentGrade === 'B' ? 'selected' : ''}>B</option>
                        <option value="C" ${currentGrade === 'C' ? 'selected' : ''}>C</option>
                        <option value="D" ${currentGrade === 'D' ? 'selected' : ''}>D</option>
                        <option value="F" ${currentGrade === 'F' ? 'selected' : ''}>F</option>
                    </select>
                </div>
                <button class="btn btn-primary w-100" onclick="submitGrade('${studentId}', '${sectionId}')">Update Grade</button>`;
            infoModal.show();
        }

        async function submitGrade(studentId, sectionId) {
            const grade = document.getElementById('new-grade').value;
            const response = await fetch('/api/instructor/grade', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ student_id: studentId, section_id: sectionId, grade: grade })
            });
            if (response.ok) {
                infoModal.hide();
                loadRoster(sectionId);
            }
        }

        async function loadAdvisees() {
            const response = await fetch(`/api/instructor/advisees`);
            const data = await response.json();
            const tbody = document.getElementById('advisee-data');
            tbody.innerHTML = data.map(s => `
                <tr>
                    <td>${s.ID}</td>
                    <td>${s.name}</td>
                    <td><button class="btn btn-sm btn-danger" onclick="removeAdvisee('${s.ID}')">Remove</button></td>
                </tr>`).join('');
        }

        async function addAdvisee() {
            const studentId = document.getElementById('new-student-id').value;
            const response = await fetch('/api/instructor/add_advisee', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ student_id: studentId })
            });
            if (response.ok) loadAdvisees();
            else alert("Could not add student.");
        }

        async function removeFromSection(studentId, sectionId) {
            if(!confirm("Remove student from this class?")) return;
            const response = await fetch('/api/instructor/remove_from_section', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ student_id: studentId, section_id: sectionId })
            });
            if (response.ok) loadRoster(sectionId);
        }

        async function loadProfileData() {
            const response = await fetch(`/api/instructor_details/${currentInstructorId}`);
            const data = await response.json();
            if (data) {
                document.getElementById('fname').value = data.first_name || '';
                document.getElementById('lname').value = data.last_name || '';
            }
        }

        async function updateProfile() {
            const updatedInfo = {
                first_name: document.getElementById('fname').value,
                last_name: document.getElementById('lname').value
            };
            const response = await fetch(`/api/update_instructor_name/${currentInstructorId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(updatedInfo)
            });
            if (response.ok) alert("Information updated!");
        }

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { display: flex; min-height: 100vh; background-color: #f8f9fa; }
        .sidebar {
            width: 250px;
            background-color: #2c3e50;
            color: white;
            padding: 20px 0;
            flex-shrink: 0;
        }
        .sidebar h2 { padding: 0 20px; font-size: 1.5rem; margin-bottom: 30px; }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.8);
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar .nav-link:hover { background-color: #34495e; color: white; }
        .sidebar .nav-link.active { background-color: #34495e; font-weight: bold; }
        .content { flex-grow: 1; padding: 40px; }
        .logout-btn { margin: 0 20px 20px 20px; }
        /* Styling for the clickable course names */
        .course-link { color: #0d6efd; text-decoration: none; cursor: pointer; font-weight: bold; }
        .course-link:hover { text-decoration: underline; color: #0a58ca; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logout-btn">
            <a href="/logout" class="btn btn-sm btn-light">Logout</a>
        </div>
        <h2>Student</h2>
        <div class="nav flex-column">
            <a class="nav-link active" onclick="showSection('schedule')">My Schedule</a>
            <a class="nav-link" onclick="showSection('registration')">Register/Drop</a>
            <a class="nav-link" onclick="showSection('grades')">Final Grades</a>
            <a class="nav-link" onclick="showSection('advisor')">Advisor Info</a>
            <a class="nav-link" onclick="showSection('profile')">Personal Info</a>
        </div>
    </div>

    <div class="content">
        <h1 id="page-title">My Schedule</h1>
        <hr>
        <div id="content-area"></div>
    </div>

    <div class="modal fade" id="infoModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="modalBody">
                    Loading...
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const currentStudentId = 1; 
        let infoModal;

        // Initialize modal and load default section
        window.onload = () => {
            infoModal = new bootstrap.Modal(document.getElementById('infoModal'));
            showSection('schedule');
        };

        function showSection(section) {
            const area = document.getElementById('content-area');
            const title = document.getElementById('page-title');
            
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            if (event && event.target) event.target.classList.add('active');

            if (section === 'schedule') {
                title.innerText = "Current Course Load";
                area.innerHTML = `
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <select id="filter-semester" class="form-select">
                                <option value="Fall">Fall</option>
                                <option value="Spring">Spring</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <select id="filter-year" class="form-select">
                                <option value="2026">2026</option>
                                <option value="2025">2025</option>
                                <option value="2027">2027</option>
                                <option value="2028">2028</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <button class="btn btn-primary w-100" onclick="loadSchedule()">Filter Schedule</button>
                        </div>
                    </div>
                    <table class="table table-striped">
                        <thead>
                            <tr><th>Course</th><th>Day</th><th>Time</th><th>Room</th><th>Status</th></tr>
                        </thead>
                        <tbody id="schedule-data"></tbody>
                    </table>`;
                loadSchedule();
            } 
            else if (section === 'registration') {
                title.innerText = "Register or Drop Classes";
                area.innerHTML = `
                    <div class="card p-3 mb-4">
                        <h5>Available Sections</h5>
                        <div class="input-group mb-3">
                            <select id="section-select" class="form-select"></select>
                            <button class="btn btn-success" onclick="enroll()">Register</button>
                        </div>
                    </div>
                    <div class="card p-3">
                        <h5>Current Enrollments (Drop)</h5>
                        <div id="drop-list" class="list-group"></div>
                    </div>`;
                loadAvailableSections();
                loadDropList();
            }
            else if (section === 'grades') {
                title.innerText = "Academic History";
                area.innerHTML = `
                    <p class="text-muted small mb-3">Click on a course name to view full section info.</p>
                    <table class="table">
                        <thead><tr><th>Course Name</th><th>Semester</th><th>Year</th><th>Grade</th></tr></thead>
                        <tbody id="grade-data"></tbody>
                    </table>`;
                loadGrades();
            }
            else if (section === 'advisor') {
                title.innerText = "Advisor Information";
                area.innerHTML = `<div id="advisor-data" class="alert alert-info">Loading...</div>`;
                loadAdvisor();
            }
            else if (section === 'profile') {
                title.innerText = "Personal Information";
                area.innerHTML = `
                    <div class="card p-4" style="max-width: 500px;">
                        <form id="profile-form">
                            <div class="mb-3">
                                <label class="form-label">First Name</label>
                                <input type="text" class="form-control" id="fname" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Last Name</label>
                                <input type="text" class="form-control" id="lname" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Department ID</label>
                                <input type="number" class="form-control" id="dept_id" readonly>
                                <small class="text-muted">Contact registrar to change department.</small>
                            </div>
                            <button type="button" class="btn btn-primary" onclick="updateProfile()">Save Changes</button>
                        </form>
                    </div>`;
                loadProfileData();
            }
        }

        function formatTime(hr, min) {
            return `${hr.toString().padStart(2, '0')}:${min.toString().padStart(2, '0')}`;
        }

        // --- Data Fetching Functions ---

        async function loadSchedule() {
    const sem = document.getElementById('filter-semester').value;
    const yr = document.getElementById('filter-year').value;
    const response = await fetch(`/api/student/schedule?semester=${sem}&year=${yr}`);
    const data = await response.json();
    const tbody = document.getElementById('schedule-data');
    
    if (!data || data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted">No classes found for ${sem} ${yr}</td></tr>`;
        return;
    }

    tbody.innerHTML = data.map(s => {
        // Fallback logic: If building_name is missing, use building (ID)
        const buildingDisplay = s.building_name || s.building || "TBD";
        
        return `
            <tr>
                <td><strong>${s.title}</strong><br><small>Section: ${s.section_id}</small></td>
                <td>${s.day}</td>
                <td>${formatTime(s.start_hr, s.start_min)} - ${formatTime(s.end_hr, s.end_min)}</td>
                <td>${buildingDisplay} ${s.room_number}</td>
                <td><span class="badge bg-success">Enrolled</span></td>
            </tr>
        `;
    }).join('');
}

        async function loadGrades() {
            const response = await fetch(`/api/student/${currentStudentId}/grades`);
            const data = await response.json();
            const gradeTableBody = document.getElementById('grade-data');
            
            if (!data || data.length === 0) {
                gradeTableBody.innerHTML = `<tr><td colspan="4" class="text-center text-muted">No grades recorded yet.</td></tr>`;
                return;
            }

            gradeTableBody.innerHTML = data.map(g => `
                <tr>
                    <td>
                        <span class="course-link" onclick="viewSectionInfo(${g.section_id})">
                            ${g.title}
                        </span>
                    </td>
                    <td>${g.semester}</td>
                    <td>${g.year}</td>
                    <td>
                        <span class="badge ${g.grade === 'F' ? 'bg-danger' : 'bg-primary'}">
                            ${g.grade || 'In Progress'}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        async function viewSectionInfo(sectionId) {
    // 1. Show the modal placeholder
    infoModal.show();
    document.getElementById('modalBody').innerHTML = `
        <div class="text-center">
            <div class="spinner-border text-primary" role="status"></div>
            <p>Loading details...</p>
        </div>`;
    
    try {
        // 2. Call the API that uses the stored procedure
        const response = await fetch(`/api/section_details/${sectionId}`);
        const s = await response.json();
        
        if (!s || Object.keys(s).length === 0) {
            document.getElementById('modalBody').innerHTML = "No details found for this section.";
            return;
        }
        
        // 3. Update the Modal with data from the procedure
        document.getElementById('modalTitle').innerText = s.title;
        document.getElementById('modalBody').innerHTML = `
            <div class="list-group list-group-flush">
                <div class="list-group-item"><strong>Department:</strong> ${s.dept_name}</div>
                <div class="list-group-item"><strong>Term:</strong> ${s.semester} ${s.year}</div>
                <div class="list-group-item"><strong>Building:</strong> ${s.building_name}</div>
                <div class="list-group-item"><strong>Room Number:</strong> ${s.room_number}</div>
            </div>
            <div class="mt-3 text-center">
                <span class="badge bg-secondary">Section ID: ${sectionId}</span>
            </div>
        `;
    } catch (err) {
        console.error("Error:", err);
        document.getElementById('modalBody').innerHTML = "An error occurred while fetching section info.";
    }
}

        async function loadAvailableSections() {
            const response = await fetch('/api/available_sections');
            const data = await response.json();
            const select = document.getElementById('section-select');
            select.innerHTML = '<option value="">Choose a class...</option>' + 
                data.map(sec => `<option value="${sec.section_id}">ID: ${sec.section_id} (${sec.semester} ${sec.year})</option>`).join('');
        }

        async function enroll() {
            const sectionId = document.getElementById('section-select').value;
            if (!sectionId) return alert("Select a section");
            const response = await fetch('/api/enroll', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ student_id: currentStudentId, section_id: sectionId })
            });
            const result = await response.json();
            alert(result.message || "Processed");
            showSection('registration');
        }

async function loadDropList() {
    const response = await fetch(`/api/student/current_enrollments?student_id=${currentStudentId}`);
    const data = await response.json();
    const list = document.getElementById('drop-list');

    if (!data || data.length === 0) {
        list.innerHTML = "<div class='list-group-item text-muted'>No current enrollments found.</div>";
        return;
    }

    list.innerHTML = data.map(course => `
        <div class="list-group-item d-flex justify-content-between align-items-center">
            <div>
                <strong>${course.title}</strong><br>
                <small class="text-muted">Section ${course.section_id} | ${course.semester} ${course.year}</small>
            </div>
            <button class="btn btn-sm btn-danger" onclick="dropSection(${course.section_id})">Drop</button>
        </div>`).join('');
}

        async function dropSection(sectionId) {
            if (!confirm("Confirm Drop?")) return;
            const response = await fetch('/api/drop', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ student_id: currentStudentId, section_id: sectionId })
            });
            if (response.ok) loadDropList();
        }

        async function loadAdvisor() {
    const response = await fetch(`/api/student/${currentStudentId}/advisor`);
    const advisor = await response.json();
    const area = document.getElementById('advisor-data');
    
    if (advisor && advisor.first_name) {
        // We wrap the name in a span with a click event
        area.innerHTML = `
            <strong>Advisor Name:</strong> 
            <span class="course-link" onclick="viewAdvisorDetails(${advisor.advisor_id})">
                ${advisor.first_name} ${advisor.last_name}
            </span>`;
    } else {
        area.innerHTML = "No advisor assigned.";
    }
}

async function viewAdvisorDetails(instructorId) {
    infoModal.show();
    document.getElementById('modalBody').innerHTML = "Loading advisor details...";
    
    try {
        const response = await fetch(`/api/instructor_details/${instructorId}`);
        const info = await response.json();
        
        document.getElementById('modalTitle').innerText = "Advisor Profile";
        document.getElementById('modalBody').innerHTML = `
            <div class="text-center mb-3">
                <div class="bg-secondary text-white rounded-circle d-inline-block p-3 mb-2">
                    <h2 class="m-0">${info.first_name[0]}${info.last_name[0]}</h2>
                </div>
                <h4>${info.first_name} ${info.last_name}</h4>
            </div>
            <ul class="list-group list-group-flush">
                <li class="list-group-item"><strong>Department:</strong> ${info.dept_name}</li>
                <li class="list-group-item"><strong>Office Building:</strong> ${info.building}</li>
                <li class="list-group-item"><strong>Instructor ID:</strong> ${instructorId}</li>
            </ul>
        `;
    } catch (err) {
        document.getElementById('modalBody').innerHTML = "Error loading advisor details.";
    }
}

        async function loadProfileData() {
            const response = await fetch(`/api/student_details/${currentStudentId}`);
            const data = await response.json();
            if (data) {
                document.getElementById('fname').value = data.first_name || '';
                document.getElementById('lname').value = data.last_name || '';
                document.getElementById('dept_id').value = data.dept_id || '';
            }
        }

        async function updateProfile() {
            const updatedInfo = {
                first_name: document.getElementById('fname').value,
                last_name: document.getElementById('lname').value
            };
            const response = await fetch(`/api/update_student_name/${currentStudentId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(updatedInfo)
            });
            if (response.ok) alert("Information updated!");
            else alert("Update failed.");
        }

    </script>
</body>
</html>

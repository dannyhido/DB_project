<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { display: flex; min-height: 100vh; background-color: #f8f9fa; }
        .sidebar { width: 250px; background-color: #2c3e50; color: white; padding: 20px 0; flex-shrink: 0; }
        .sidebar h2 { padding: 0 20px; font-size: 1.5rem; margin-bottom: 30px; }
        .sidebar .nav-link { color: rgba(255,255,255,0.8); padding: 12px 20px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background-color: #34495e; color: white; font-weight: bold; }
        .content { flex-grow: 1; padding: 40px; }
        .logout-btn { margin: 0 20px 20px 20px; }
        .course-link { color: #0d6efd; cursor: pointer; font-weight: bold; }
        .course-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="logout-btn">
        <a href="/logout" class="btn btn-sm btn-light w-100">Logout</a>
    </div>
    <h2>Student</h2>
    <div class="nav flex-column">
        <a class="nav-link active" onclick="showSection('schedule', this)">My Schedule</a>
        <a class="nav-link" onclick="showSection('registration', this)">Register / Drop</a>
        <a class="nav-link" onclick="showSection('grades', this)">Final Grades</a>
        <a class="nav-link" onclick="showSection('advisor', this)">Advisor Info</a>
        <a class="nav-link" onclick="showSection('profile', this)">Personal Info</a>
    </div>
</div>

<div class="content">
    <h1 id="page-title">My Schedule</h1>
    <hr>
    <div id="content-area"></div>
</div>

<!-- Info Modal -->
<div class="modal fade" id="infoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="modalBody">Loading...</div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const currentStudentId = {{ student_id }};
    let infoModal;

    window.onload = () => {
        infoModal = new bootstrap.Modal(document.getElementById('infoModal'));
        showSection('schedule', document.querySelector('.nav-link'));
    };

    function showSection(section, el) {
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        if (el) el.classList.add('active');
        const area = document.getElementById('content-area');
        const title = document.getElementById('page-title');

        if (section === 'schedule') {
            title.innerText = "My Schedule";
            area.innerHTML = `
                <div class="row mb-3 g-2">
                    <div class="col-md-4">
                        <select id="filter-semester" class="form-select">
                            <option value="Fall">Fall</option>
                            <option value="Spring">Spring</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <select id="filter-year" class="form-select">
                            <option>2026</option><option>2027</option><option>2025</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <button class="btn btn-primary w-100" onclick="loadSchedule()">Filter</button>
                    </div>
                </div>
                <table class="table table-striped">
                    <thead><tr><th>Course</th><th>Day</th><th>Time</th><th>Room</th><th>Status</th></tr></thead>
                    <tbody id="schedule-data"></tbody>
                </table>`;
            loadSchedule();
        }
        else if (section === 'registration') {
            title.innerText = "Register or Drop Classes";
            area.innerHTML = `
                <div class="card p-3 mb-3">
                    <h5>Available Sections</h5>
                    <div class="input-group">
                        <select id="section-select" class="form-select"></select>
                        <button class="btn btn-success" onclick="enroll()">Register</button>
                    </div>
                </div>
                <div class="card p-3">
                    <h5>Current Enrollments</h5>
                    <div class="row mb-2 g-2">
                        <div class="col-md-4">
                            <select id="drop-semester" class="form-select">
                                <option value="Fall">Fall</option>
                                <option value="Spring">Spring</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <select id="drop-year" class="form-select">
                                <option>2026</option><option>2027</option><option>2025</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <button class="btn btn-outline-primary w-100" onclick="loadDropList()">Load</button>
                        </div>
                    </div>
                    <div id="drop-list" class="list-group"></div>
                </div>`;
            loadAvailableSections();
            loadDropList();
        }
        else if (section === 'grades') {
            title.innerText = "Academic History";
            area.innerHTML = `
                <p class="text-muted small">Click a course name to view section details.</p>
                <table class="table">
                    <thead><tr><th>Course</th><th>Semester</th><th>Year</th><th>Grade</th></tr></thead>
                    <tbody id="grade-data"><tr><td colspan="4" class="text-center text-muted">Loading...</td></tr></tbody>
                </table>`;
            loadGrades();
        }
        else if (section === 'advisor') {
            title.innerText = "Advisor Information";
            area.innerHTML = `<div id="advisor-data" class="alert alert-info">Loading...</div>`;
            loadAdvisor();
        }
        else if (section === 'profile') {
            title.innerText = "Personal Information";
            area.innerHTML = `
                <div class="card p-4" style="max-width:500px;">
                    <div class="mb-3"><label class="form-label">First Name</label><input class="form-control" id="fname"></div>
                    <div class="mb-3"><label class="form-label">Last Name</label><input class="form-control" id="lname"></div>
                    <div class="mb-3"><label class="form-label">Department</label><input class="form-control" id="dept_name" readonly></div>
                    <button class="btn btn-primary" onclick="updateProfile()">Save Changes</button>
                </div>`;
            loadProfile();
        }
    }

    function formatTime(hr, min) {
        return `${String(hr).padStart(2,'0')}:${String(min).padStart(2,'0')}`;
    }

    async function loadSchedule() {
        const sem = document.getElementById('filter-semester').value;
        const yr = document.getElementById('filter-year').value;
        const res = await fetch(`/api/student/schedule?semester=${sem}&year=${yr}`);
        const data = await res.json();
        const tbody = document.getElementById('schedule-data');
        if (!data.length) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-muted text-center">No courses found for ${sem} ${yr}</td></tr>`;
            return;
        }
        tbody.innerHTML = data.map(s => `
            <tr>
                <td><span class="course-link" onclick="viewSection(${s.section_id})">${s.title}</span></td>
                <td>${s.day}</td>
                <td>${formatTime(s.start_hr, s.start_min)} - ${formatTime(s.end_hr, s.end_min)}</td>
                <td>${s.building_name} ${s.room_number}</td>
                <td><span class="badge bg-primary">Enrolled</span></td>
            </tr>`).join('');
    }

    async function loadAvailableSections() {
        const res = await fetch('/api/available_sections');
        const data = await res.json();
        const sel = document.getElementById('section-select');
        sel.innerHTML = '<option value="">Choose a section...</option>' +
            data.map(s => `<option value="${s.section_id}">Section ${s.section_id} – Course ${s.course_id} (${s.semester} ${s.year})</option>`).join('');
    }

    async function enroll() {
        const sectionId = document.getElementById('section-select').value;
        if (!sectionId) return alert("Select a section first");
        const res = await fetch('/api/enroll', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({section_id: sectionId})
        });
        const result = await res.json();
        alert(result.message || "Processed");
        loadDropList();
    }

    async function loadDropList() {
        const sem = document.getElementById('drop-semester') ? document.getElementById('drop-semester').value : 'Fall';
        const yr = document.getElementById('drop-year') ? document.getElementById('drop-year').value : '2026';
        const res = await fetch(`/api/student/current_enrollments?semester=${sem}&year=${yr}`);
        const data = await res.json();
        const list = document.getElementById('drop-list');
        if (!data || !data.length) {
            list.innerHTML = `<div class="list-group-item text-muted">No enrollments found for ${sem} ${yr}</div>`;
            return;
        }
        list.innerHTML = data.map(c => `
            <div class="list-group-item d-flex justify-content-between align-items-center">
                <div>
                    <strong>${c.title}</strong><br>
                    <small class="text-muted">Section ${c.section_id} | Status: ${c.status}</small>
                </div>
                <button class="btn btn-sm btn-danger" onclick="dropSection(${c.section_id})">Drop</button>
            </div>`).join('');
    }

    async function dropSection(sectionId) {
        if (!confirm("Drop this section?")) return;
        const res = await fetch('/api/drop', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({section_id: sectionId})
        });
        if (res.ok) loadDropList();
    }

    async function loadGrades() {
        const res = await fetch(`/api/student/${currentStudentId}/grades`);
        const data = await res.json();
        const tbody = document.getElementById('grade-data');
        if (!data.length) { tbody.innerHTML = `<tr><td colspan="4" class="text-muted text-center">No grade history</td></tr>`; return; }
        tbody.innerHTML = data.map(g => `
            <tr>
                <td><span class="course-link" onclick="viewSection(${g.section_id})">${g.title}</span></td>
                <td>${g.semester}</td>
                <td>${g.year}</td>
                <td><span class="badge ${g.grade === 'F' ? 'bg-danger' : g.grade === '' ? 'bg-secondary' : 'bg-success'}">${g.grade || 'In Progress'}</span></td>
            </tr>`).join('');
    }

    async function viewSection(sectionId) {
        infoModal.show();
        document.getElementById('modalBody').innerHTML = `<div class="text-center"><div class="spinner-border text-primary"></div></div>`;
        try {
            const res = await fetch(`/api/section_details/${sectionId}`);
            const s = await res.json();
            if (!s || !s.course_title) { document.getElementById('modalBody').innerHTML = "No details found."; return; }
            document.getElementById('modalTitle').innerText = s.course_title;
            document.getElementById('modalBody').innerHTML = `
                <ul class="list-group list-group-flush">
                    <li class="list-group-item"><strong>Term:</strong> ${s.semester} ${s.year}</li>
                    <li class="list-group-item"><strong>Building:</strong> ${s.building_name}</li>
                    <li class="list-group-item"><strong>Room:</strong> ${s.room_number}</li>
                    <li class="list-group-item"><strong>Time:</strong> ${s.day} ${formatTime(s.start_hr, s.start_min)} - ${formatTime(s.end_hr, s.end_min)}</li>
                    <li class="list-group-item"><strong>Instructor:</strong> ${s.instructor_first ? s.instructor_first + ' ' + s.instructor_last : 'TBA'}</li>
                </ul>`;
        } catch (e) {
            document.getElementById('modalBody').innerHTML = "Error loading section info.";
        }
    }

    async function loadAdvisor() {
        const res = await fetch(`/api/student/${currentStudentId}/advisor`);
        const advisor = await res.json();
        const area = document.getElementById('advisor-data');
        if (advisor && advisor.first_name) {
            area.innerHTML = `
                <h5>${advisor.first_name} ${advisor.last_name}</h5>
                <p class="mb-1"><strong>Advisor ID:</strong> ${advisor.advisor_id}</p>
                <p class="mb-0"><strong>Salary:</strong> $${advisor.salary.toLocaleString()}</p>`;
        } else {
            area.innerHTML = "No advisor assigned.";
        }
    }

    async function loadProfile() {
        const res = await fetch(`/api/student_details/${currentStudentId}`);
        const data = await res.json();
        if (data && data.first_name) {
            document.getElementById('fname').value = data.first_name;
            document.getElementById('lname').value = data.last_name;
            document.getElementById('dept_name').value = data.dept_name || '';
        }
    }

    async function updateProfile() {
        const res = await fetch(`/api/update_student_name/${currentStudentId}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                first_name: document.getElementById('fname').value,
                last_name: document.getElementById('lname').value
            })
        });
        if (res.ok) alert("Profile updated!");
        else alert("Update failed.");
    }
</script>
</body>
</html>
